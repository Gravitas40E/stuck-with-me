<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💕 Stuck With You</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--pink:#ff4d6d;
--pink-light:#ff85a1;
--purple:#c77dff;
--bg:#0b001c;
--card-bg:rgba(16,3,30,.78)
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:var(--bg);
overflow:hidden;
color:#f9fafb;
position:relative
}

/* star canvas */
#starfield{position:fixed;inset:0;z-index:0}

/* nebula */
.nebula{
position:fixed;inset:0;z-index:1;pointer-events:none;
background:
radial-gradient(ellipse 55% 45% at 18% 75%,rgba(107,15,58,.55)0%,transparent65%),
radial-gradient(ellipse 40% 35% at 85% 15%,rgba(90,0,160,.35)0%,transparent60%),
radial-gradient(ellipse 60% 40% at 50% 50%,rgba(255,77,109,.06)0%,transparent70%);
animation:nebulaDrift 14s ease-in-out infinite alternate
}

@keyframes nebulaDrift{
from{opacity:.8;transform:scale(1)}
to{opacity:1;transform:scale(1.04)}
}

/* card */
.card{
position:relative;z-index:10;
background:var(--card-bg);
border:1px solid rgba(255,100,160,.22);
backdrop-filter:blur(32px) saturate(1.9);
padding:52px 40px 44px;
border-radius:32px;
text-align:center;
max-width:490px;width:92%;
box-shadow:0 32px 80px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,180,210,.12);
animation:cardIn .85s cubic-bezier(.34,1.56,.64,1) both
}

@keyframes cardIn{
from{opacity:0;transform:scale(.65) translateY(40px)}
to{opacity:1;transform:scale(1) translateY(0)}
}

.emoji-top{
font-size:2.9rem;
display:block;
margin-bottom:14px;
animation:heartBeat 1.8s ease-in-out infinite
}

@keyframes heartBeat{
0%,100%{transform:scale(1)}
50%{transform:scale(1.15)}
}

h1{
font-family:'Dancing Script',cursive;
font-weight:700;
font-size:2rem;
line-height:1.4;
min-height:3.2rem;
margin-bottom:10px
}

.btn-row{display:flex;justify-content:center;gap:22px}

button{
font-family:'Poppins',sans-serif;
font-weight:600;
border:none;
border-radius:999px;
cursor:pointer
}

#yes{
font-size:16px;
padding:15px 38px;
background:linear-gradient(135deg,#ff4d6d,#ff85a1);
color:#fff;
box-shadow:0 0 24px rgba(255,80,120,.75);
transition:transform .15s,font-size .35s
}

#yes:hover{transform:scale(1.09)}
#yes:active{transform:scale(.95)}

#no{
font-size:15px;
padding:14px 30px;
background:rgba(8,3,20,.85);
color:rgba(255,255,255,.6);
border:1px solid rgba(255,255,255,.1);
position:fixed;
transition:left .3s cubic-bezier(.22,1,.36,1),top .3s cubic-bezier(.22,1,.36,1),font-size .4s,opacity .5s
}

#no-tip{
position:fixed;
background:rgba(18,4,35,.95);
border:1px solid rgba(255,100,160,.45);
border-radius:14px;
padding:7px 16px;
font-size:.8rem;
color:#ff85a1;
pointer-events:none;
opacity:0;
transition:opacity .25s
}

#no-tip.show{opacity:1}

/* final screen */
#final{display:none}

.final-emoji{font-size:3.6rem;margin-bottom:14px}
.final-title{font-family:'Dancing Script',cursive;font-size:2rem;margin-bottom:16px;color:#ffb3c6}
.final-body{font-size:.97rem;line-height:1.8;margin-bottom:22px}
.final-badge{
display:inline-block;
background:linear-gradient(135deg,#ff4d6d,#c77dff);
padding:7px 22px;
border-radius:999px;
font-size:.78rem
}

/* heart particles */
.heart{
position:fixed;
pointer-events:none;
animation:heartBurst ease-out forwards
}

@keyframes heartBurst{
0%{opacity:1;transform:translate(0,0) scale(.4)}
100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.4)}
}

.sparkle{
position:fixed;
border-radius:50%;
pointer-events:none;
animation:sparkleBurst ease-out forwards
}

@keyframes sparkleBurst{
0%{opacity:1;transform:translate(0,0) scale(1)}
100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>
<div class="nebula"></div>
<div id="no-tip"></div>

<div class="card">
<span class="emoji-top">💖</span>

<h1 id="question">Are you stuck with me now?</h1>

<div class="btn-row">
<button id="yes">Yes 💕</button>
<button id="no">No</button>
</div>

<div id="final">
<span class="final-emoji">🥰</span>
<p class="final-title">Officially stuck together!</p>
<p class="final-body">
No refunds.<br>
No returns.<br>
Just you and me, forever. 💗
</p>
<span class="final-badge">✨ Certified Ride-or-Die ✨</span>
</div>
</div>

<script>

/* STARFIELD */
const cv=document.getElementById("starfield")
const cx=cv.getContext("2d")
let stars=[]

function resizeCv(){
cv.width=window.innerWidth
cv.height=window.innerHeight
}

function mkStars(){
stars=Array.from({length:180},()=>({
x:Math.random()*cv.width,
y:Math.random()*cv.height,
r:Math.random()*1.4+.25,
a:Math.random()
}))
}

function drawStars(){
cx.clearRect(0,0,cv.width,cv.height)
stars.forEach(s=>{
cx.beginPath()
cx.arc(s.x,s.y,s.r,0,Math.PI*2)
cx.fillStyle=`rgba(255,240,245,${s.a})`
cx.fill()
})
requestAnimationFrame(drawStars)
}

resizeCv()
mkStars()
drawStars()

window.addEventListener("resize",()=>{
resizeCv()
mkStars()
})

/* DOM */
const yes=document.getElementById("yes")
const no=document.getElementById("no")
const noTip=document.getElementById("no-tip")
const finalDiv=document.getElementById("final")
const card=document.querySelector(".card")

let clicks=0
let yesSize=16
let noEscapes=0

/* SAFE PLACEMENT */
function placeNo(){

const r=card.getBoundingClientRect()
const w=no.offsetWidth||90
const h=no.offsetHeight||50

let x=r.right+20
let y=r.bottom-h-4

if(x+w>window.innerWidth-12){
x=r.left+r.width/2-w/2
y=r.bottom+14
}

x=Math.max(12,Math.min(x,window.innerWidth-w-12))
y=Math.max(12,Math.min(y,window.innerHeight-h-12))

no.style.left=x+"px"
no.style.top=y+"px"
}

window.addEventListener("load",placeNo)
window.addEventListener("resize",()=>{if(no.style.display!=="none")placeNo()})

/* NO ESCAPE */
function moveNo(){

noEscapes++

const pad=20
const w=no.offsetWidth
const h=no.offsetHeight

const x=Math.random()*(window.innerWidth-w-pad*2)+pad
const y=Math.random()*(window.innerHeight-h-pad*2)+pad

no.style.left=x+"px"
no.style.top=y+"px"

no.style.fontSize=Math.max(9,15-noEscapes*.7)+"px"
no.style.opacity=Math.max(.15,.65-noEscapes*.045)

noTip.textContent="Nice try~"
noTip.style.left=x+"px"
noTip.style.top=y-40+"px"
noTip.classList.add("show")

setTimeout(()=>noTip.classList.remove("show"),1200)
}

document.addEventListener("mousemove",e=>{
const r=no.getBoundingClientRect()
const dx=e.clientX-(r.left+r.width/2)
const dy=e.clientY-(r.top+r.height/2)
if(Math.sqrt(dx*dx+dy*dy)<115)moveNo()
})

/* YES CLICK */
yes.onclick=e=>{

clicks++
yesSize=Math.min(yesSize+5,48)
yes.style.fontSize=yesSize+"px"

if(clicks>=5){

document.getElementById("question").style.display="none"
document.querySelector(".btn-row").style.display="none"
finalDiv.style.display="block"

const cr=card.getBoundingClientRect()

for(let i=0;i<120;i++){

const heart=document.createElement("div")
heart.className="heart"
heart.textContent="💖"

const angle=Math.random()*Math.PI*2
const dist=Math.random()*260+80

heart.style.left=cr.left+cr.width/2+"px"
heart.style.top=cr.top+cr.height/2+"px"

heart.style.setProperty("--dx",Math.cos(angle)*dist+"px")
heart.style.setProperty("--dy",Math.sin(angle)*dist+"px")

document.body.appendChild(heart)
setTimeout(()=>heart.remove(),2000)
}

no.style.display="none"
noTip.style.display="none"
}

}

</script>

</body>
</html>
