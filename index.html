<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💕 Stuck With You</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --red:#ff4d6d;
  --red-light:#ff85a1;
  --blue:#3a86ff;
  --blue-light:#4dabff;
  --purple:#c77dff;
  --card-bg:rgba(8,12,28,.84);
}

body{
  min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(160deg,#010d1e 0%,#03001a 30%,#080015 60%,#00080e 100%);
  overflow:hidden;color:#f9fafb;
  position:relative;
}

/* ─── Starfield ─── */
#starfield{position:fixed;inset:0;z-index:0}

/* ─── Nebula ─── */
.nebula{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 15% 78%,rgba(120,10,50,.5)  0%,transparent 65%),
    radial-gradient(ellipse 45% 40% at 85% 15%,rgba(0,35,120,.45)  0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 50%,rgba(255,77,109,.05) 0%,transparent 70%),
    radial-gradient(ellipse 40% 35% at 72% 65%,rgba(20,70,200,.22)  0%,transparent 55%);
  animation:nebulaDrift 14s ease-in-out infinite alternate;
}
@keyframes nebulaDrift{from{opacity:.8;transform:scale(1)}to{opacity:1;transform:scale(1.04)}}

/* ─── Floating particles ─── */
.fp{
  position:fixed;pointer-events:none;z-index:2;
  animation:floatUp linear infinite;opacity:0;
}
@keyframes floatUp{
  0%  {transform:translateY(108vh) rotate(0deg)   scale(.8);opacity:0}
  8%  {opacity:.55}
  92% {opacity:.4}
  100%{transform:translateY(-15vh)  rotate(420deg) scale(1.1);opacity:0}
}

/* ─── Card ─── */
.card{
  position:relative;z-index:10;
  background:var(--card-bg);
  border:1px solid rgba(100,160,255,.18);
  backdrop-filter:blur(32px) saturate(1.9);
  -webkit-backdrop-filter:blur(32px) saturate(1.9);
  padding:52px 40px 44px;
  border-radius:32px;text-align:center;
  max-width:490px;width:92%;
  box-shadow:
    0 32px 80px rgba(0,0,0,.75),
    inset 0 1px 0 rgba(255,180,210,.08),
    0 0 50px rgba(255,77,109,.18);
  animation:cardIn .85s cubic-bezier(.34,1.56,.64,1) both;
  transition:transform .18s ease, box-shadow .6s ease;
}
@keyframes cardIn{
  from{opacity:0;transform:scale(.65) translateY(40px)}
  to  {opacity:1;transform:scale(1)   translateY(0)}
}

/* Spinning conic border glow */
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
.card::before{
  content:'';position:absolute;inset:-1px;border-radius:33px;
  background:conic-gradient(from var(--a),
    transparent 10%,
    rgba(255,77,109,.7) 25%,
    transparent 40%,
    rgba(58,134,255,.7) 65%,
    transparent 80%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  padding:1px;pointer-events:none;
  animation:spinBorder 5s linear infinite;
}
@keyframes spinBorder{to{--a:360deg}}

/* Ambient glow behind card */
.card::after{
  content:'';position:absolute;inset:-22px;border-radius:52px;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,77,109,.14) 0%,rgba(58,134,255,.08) 55%,transparent 72%);
  pointer-events:none;z-index:-1;
  animation:glowBreath 3.5s ease-in-out infinite;
}
@keyframes glowBreath{
  0%,100%{opacity:.65;transform:scale(1);filter:hue-rotate(0deg)}
  50%    {opacity:1;  transform:scale(1.07);filter:hue-rotate(210deg)}
}

.card.shake{animation:cardShake .42s ease both!important}
@keyframes cardShake{
  0%,100%{transform:translateX(0) rotate(0)}
  18%    {transform:translateX(-7px) rotate(-1.2deg)}
  36%    {transform:translateX(7px)  rotate(1.2deg)}
  54%    {transform:translateX(-4px) rotate(-.6deg)}
  72%    {transform:translateX(4px)  rotate(.6deg)}
}

/* ─── Top emoji ─── */
.emoji-top{
  font-size:2.9rem;display:block;margin-bottom:14px;
  animation:heartBeat 1.9s ease-in-out infinite;
  filter:drop-shadow(0 0 14px rgba(255,77,109,.9));
}
@keyframes heartBeat{
  0%,100%{transform:scale(1);  filter:drop-shadow(0 0 14px rgba(255,77,109,.9))}
  14%    {transform:scale(1.16);filter:drop-shadow(0 0 28px rgba(255,77,109,1))}
  28%    {transform:scale(1)}
  42%    {transform:scale(1.1)}
}

/* ─── Question ─── */
h1{
  font-family:'Dancing Script',cursive;font-weight:700;
  font-size:2rem;line-height:1.4;min-height:3.2rem;
  margin-bottom:8px;
  color:#fff;text-shadow:0 0 28px rgba(255,140,170,.5);
  transition:opacity .22s,transform .22s;
}
#qtext{display:inline}

.cursor{
  display:inline-block;width:2.5px;height:.88em;
  background:#ffb3c6;vertical-align:-.06em;
  margin-left:2px;border-radius:2px;
  animation:blink .72s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

/* ─── Progress dots ─── */
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.18);
  transition:background .4s,transform .4s,box-shadow .4s;
}
.dot.active{
  background:var(--red-light);transform:scale(1.35);
  box-shadow:0 0 10px var(--red);
}
.dot.done{background:var(--blue-light);box-shadow:0 0 7px var(--blue)}

/* ─── Button row ─── */
.btn-row{display:flex;justify-content:center;gap:22px;align-items:center}

button{
  font-family:'Poppins',sans-serif;font-weight:600;
  letter-spacing:.04em;border:none;border-radius:999px;
  cursor:pointer;position:relative;overflow:hidden;
}

/* YES */
#yes{
  font-size:16px;padding:15px 38px;
  background:linear-gradient(135deg,#ff4d6d,#ff85a1 55%,#ffb3c6);
  color:#fff;
  box-shadow:0 0 24px rgba(255,80,120,.75),0 5px 18px rgba(255,77,109,.45);
  animation:yesGlow 2.6s ease-in-out infinite;
  transition:transform .15s,font-size .35s cubic-bezier(.34,1.56,.64,1),box-shadow .4s;
}
@keyframes yesGlow{
  0%,100%{box-shadow:0 0 24px rgba(255,80,120,.75),0 5px 18px rgba(255,77,109,.4)}
  50%    {box-shadow:0 0 44px rgba(255,80,120,1),  0 8px 28px rgba(255,77,109,.65)}
}
#yes:hover{transform:scale(1.09);animation:none;box-shadow:0 0 52px rgba(255,80,120,1),0 8px 32px rgba(255,77,109,.7)}
#yes:active{transform:scale(.95)}

/* Ripple */
.ripple{
  position:absolute;border-radius:50%;pointer-events:none;
  background:rgba(255,255,255,.35);transform:scale(0);
  animation:rippleAnim .65s linear;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* NO — starts static inside card, becomes fixed after first escape */
#no{
  font-size:15px;padding:14px 30px;
  background:rgba(8,3,20,.85);
  color:rgba(255,255,255,.65);
  border:1px solid rgba(255,255,255,.1);
  transition:font-size .4s,opacity .5s,transform .15s;
}
#no.escaped{
  position:fixed;
  transition:
    left  .32s cubic-bezier(.22,1,.36,1),
    top   .32s cubic-bezier(.22,1,.36,1),
    font-size .4s,opacity .5s,transform .15s;
}
#no:active{transform:scale(.92)}

/* NO tooltip */
#no-tip{
  position:fixed;z-index:999;
  background:rgba(6,12,28,.95);
  border:1px solid rgba(77,171,255,.4);
  border-radius:14px;padding:7px 16px;
  font-size:.8rem;color:#4dabff;
  pointer-events:none;white-space:nowrap;
  opacity:0;transition:opacity .25s;
  box-shadow:0 4px 20px rgba(58,134,255,.2);
}
#no-tip.show{opacity:1}

/* ─── Final screen ─── */
#final{display:none}

.final-emoji{
  font-size:3.6rem;display:block;margin-bottom:14px;
  filter:drop-shadow(0 0 18px rgba(255,77,109,.9));
  animation:bounceIn .75s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes bounceIn{
  from{opacity:0;transform:scale(.25) rotate(-15deg)}
  to  {opacity:1;transform:scale(1)   rotate(0deg)}
}
.final-title{
  font-family:'Dancing Script',cursive;font-weight:700;
  font-size:2rem;margin-bottom:16px;
  background:linear-gradient(135deg,#ff4d6d,#4dabff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:fadeUp .55s .22s ease both;
}
.final-body{
  font-size:.97rem;color:rgba(255,255,255,.87);
  line-height:1.9;margin-bottom:22px;
  animation:fadeUp .55s .42s ease both;
}
.final-badge{
  display:inline-block;
  background:linear-gradient(135deg,#ff4d6d,#3a86ff);
  color:#fff;font-size:.79rem;letter-spacing:.09em;
  padding:7px 22px;border-radius:999px;font-weight:700;
  animation:fadeUp .55s .62s ease both,badgePulse 2.2s 1.2s ease-in-out infinite;
  box-shadow:0 4px 22px rgba(255,77,109,.5);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes badgePulse{0%,100%{box-shadow:0 4px 22px rgba(255,77,109,.5)}50%{box-shadow:0 4px 34px rgba(58,134,255,.75)}}

/* ─── Burst FX ─── */
.heart{
  position:fixed;pointer-events:none;z-index:998;
  animation:heartBurst ease-out forwards;
}
@keyframes heartBurst{
  0%  {opacity:1;transform:translate(0,0) scale(.4) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.5) rotate(var(--dr))}
}
.sparkle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:997;
  animation:sparkleBurst ease-out forwards;
}
@keyframes sparkleBurst{
  0%  {opacity:1;transform:translate(0,0) scale(1.3)}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula"></div>
<div id="no-tip"></div>

<div class="card">
  <span class="emoji-top">💖</span>

  <h1 id="question">
    <span id="qtext"></span>
    <span class="cursor" id="cursor"></span>
  </h1>

  <div class="dots" id="dots"></div>

  <div class="btn-row">
    <button id="yes">Yes ❤️</button>
    <button id="no">No</button>
  </div>

  <div id="final">
    <span class="final-emoji">🥰</span>
    <p class="final-title">Officially stuck together.</p>
    <p class="final-body">
      No refunds.<br>
      No returns.<br>
      Just you and me — permanently.
    </p>
    <span class="final-badge">✨ Certified Ride-or-Die ✨</span>
  </div>
</div>

<script>
/* ══ STARFIELD (twinkling) ══ */
const cv = document.getElementById('starfield');
const cx = cv.getContext('2d');
let stars = [];

function resizeCv(){
  cv.width  = innerWidth;
  cv.height = innerHeight;
}

function mkStars(){
  stars = Array.from({length:170}, () => ({
    x:     Math.random() * cv.width,
    y:     Math.random() * cv.height,
    r:     Math.random() * 1.4 + .25,
    base:  Math.random() * .4 + .1,
    amp:   Math.random() * .45 + .1,
    spd:   Math.random() * .0007 + .0003,
    phase: Math.random() * Math.PI * 2,
    hue:   Math.random() < .18 ? 'blue' : Math.random() < .12 ? 'pink' : 'white',
  }));
}

function drawStars(t){
  cx.clearRect(0, 0, cv.width, cv.height);
  stars.forEach(s => {
    const a = s.base + s.amp * Math.abs(Math.sin(s.phase + t * s.spd));
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    cx.fillStyle = s.hue === 'blue'
      ? `rgba(77,171,255,${a})`
      : s.hue === 'pink'
        ? `rgba(255,180,220,${a})`
        : `rgba(255,240,248,${a})`;
    cx.fill();
  });
  requestAnimationFrame(drawStars);
}

resizeCv(); mkStars(); requestAnimationFrame(drawStars);
window.addEventListener('resize', () => { resizeCv(); mkStars(); });

/* ══ FLOATING PARTICLES ══ */
const MOJI = ['❤️','💕','💖','💗','✨','🌸','💫','🦋','💝','⭐','🩵','💙'];
for(let i = 0; i < 30; i++){
  const el = document.createElement('div');
  el.className = 'fp';
  el.textContent = MOJI[i % MOJI.length];
  el.style.cssText = `
    left:${Math.random()*100}vw;
    font-size:${Math.random()*16+7}px;
    animation-duration:${Math.random()*9+8}s;
    animation-delay:${Math.random()*14}s;
  `;
  document.body.appendChild(el);
}

/* ══ DATA ══ */
const QUESTIONS = [
  'Are you stuck with me now?',
  'Are you REALLY sure? 🥺',
  'Think very carefully… 🤔',
  'Still yes? Like actually yes?',
  'Last chance to escape…',
  'Alright then… welcome to forever. 🫶'
];

const NO_TIPS = [
  'Nope, wrong button 🙃',
  'That one\'s decorative 🎀',
  'Nice try, babe~',
  'The cursor slipped, right?',
  'Not an option 💅',
  'Haha, no. ✨',
  'That button retired.',
  'Bold move. Wrong move.',
  'Glitch! Try again 👀',
  'lol no 💗'
];

const CHIME_FREQ = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 1046.5];

/* ══ DOM REFS ══ */
const yes      = document.getElementById('yes');
const no       = document.getElementById('no');
const qtextEl  = document.getElementById('qtext');
const finalDiv = document.getElementById('final');
const dotsEl   = document.getElementById('dots');
const noTip    = document.getElementById('no-tip');
const card     = document.querySelector('.card');

/* ══ STATE ══ */
let clicks    = 0;
let yesSize   = 16;
let done      = false;
let tipIdx    = 0;
let noEscapes = 0;
let audioCtx  = null;
let typeTimer = null;

/* ══ PROGRESS DOTS ══ */
QUESTIONS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

function updateDots(idx){
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot';
    if(i < idx)  d.classList.add('done');
    if(i === idx) d.classList.add('active');
  });
}

/* ══ TYPEWRITER ══ */
function typewrite(text, speed = 38){
  clearInterval(typeTimer);
  qtextEl.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    qtextEl.textContent += text[i++];
    if(i >= text.length) clearInterval(typeTimer);
  }, speed);
}

typewrite(QUESTIONS[0]);

/* ══ NO RUNS AWAY ══ */
function moveNo(){
  if(noEscapes === 0){
    no.classList.add('escaped');
  }
  noEscapes++;
  const pad = 24, w = no.offsetWidth, h = no.offsetHeight;
  const x = Math.random() * (innerWidth  - w - pad * 2) + pad;
  const y = Math.random() * (innerHeight - h - pad * 2) + pad;
  no.style.left     = x + 'px';
  no.style.top      = y + 'px';
  no.style.fontSize = Math.max(8, 15 - noEscapes * .7)  + 'px';
  no.style.opacity  = Math.max(.12, .65 - noEscapes * .045);

  const tip = NO_TIPS[tipIdx++ % NO_TIPS.length];
  noTip.textContent = tip;
  noTip.style.left  = Math.min(x, innerWidth - 215) + 'px';
  noTip.style.top   = Math.max(y - 44, 8) + 'px';
  noTip.classList.add('show');
  clearTimeout(noTip._t);
  noTip._t = setTimeout(() => noTip.classList.remove('show'), 1500);
}

/* Run away on hover/proximity — only after first escape */
document.addEventListener('mousemove', e => {
  if(done || noEscapes === 0) return;
  const r  = no.getBoundingClientRect();
  const dx = e.clientX - (r.left + r.width  / 2);
  const dy = e.clientY - (r.top  + r.height / 2);
  if(Math.sqrt(dx*dx + dy*dy) < 115) moveNo();
});

/* Run away on touch/click too */
no.addEventListener('touchstart', e => { e.preventDefault(); moveNo(); }, {passive:false});
no.addEventListener('click', moveNo);

/* ══ CARD HOVER TILT ══ */
card.addEventListener('mousemove', e => {
  if(done) return;
  const r = card.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width  - 0.5;
  const y = (e.clientY - r.top)  / r.height - 0.5;
  card.style.transform = `perspective(700px) rotateX(${-y * 8}deg) rotateY(${x * 8}deg) scale(1.01)`;
});
card.addEventListener('mouseleave', () => {
  if(!done) card.style.transform = '';
});

/* ══ WEB AUDIO CHIMES ══ */
function playChime(freq, vol = .18, dur = .55){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [1, 2].forEach((mult, idx) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = freq * mult;
      const v = idx === 0 ? vol : vol * .28;
      gain.gain.setValueAtTime(v, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur * (idx === 0 ? 1 : .65));
      osc.start(); osc.stop(audioCtx.currentTime + dur);
    });
  } catch(e){}
}

function playFanfare(){
  [783.99, 880.00, 1046.5, 1318.51].forEach((n, i) =>
    setTimeout(() => playChime(n, .22, .65), i * 165)
  );
}

/* ══ RIPPLE ══ */
function addRipple(btn, e){
  const r    = btn.getBoundingClientRect();
  const size = Math.max(btn.offsetWidth, btn.offsetHeight) * 2.2;
  const x    = ((e && e.clientX) || r.left + r.width  / 2) - r.left - size / 2;
  const y    = ((e && e.clientY) || r.top  + r.height / 2) - r.top  - size / 2;
  const rip  = document.createElement('span');
  rip.className = 'ripple';
  rip.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(rip);
  setTimeout(() => rip.remove(), 700);
}

/* ══ BURST FX ══ */
const HEARTS = ['❤️','💕','💖','💗','💝','🩷','✨','🌸','🌷','💞','⭐'];
const COLORS = ['#ff85a1','#ffb3c6','#4dabff','#3a86ff','#fff','#ff4d6d','#a0c4ff','#e0aaff'];

function burst(bx, by, count = 40){
  for(let i = 0; i < count; i++){
    const el  = document.createElement('div');
    el.className = 'heart';
    el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
    const ang = Math.random() * Math.PI * 2;
    const d   = Math.random() * 300 + 60;
    el.style.cssText = `
      left:${bx}px;top:${by}px;
      font-size:${Math.random()*15+9}px;
      --dx:${Math.cos(ang)*d}px;
      --dy:${Math.sin(ang)*d}px;
      --dr:${Math.random()*420-210}deg;
      animation-duration:${Math.random()*.85+.9}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }
  for(let i = 0; i < 75; i++){
    const sp  = document.createElement('div');
    sp.className = 'sparkle';
    const ang  = Math.random() * Math.PI * 2;
    const d    = Math.random() * 240 + 30;
    const size = Math.random() * 7 + 2;
    sp.style.cssText = `
      left:${bx}px;top:${by}px;
      width:${size}px;height:${size}px;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      --sx:${Math.cos(ang)*d}px;
      --sy:${Math.sin(ang)*d}px;
      animation-duration:${Math.random()*.5+.55}s;
    `;
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1400);
  }
}

/* ══ YES CLICK ══ */
yes.addEventListener('click', e => {
  if(done) return;

  addRipple(yes, e);
  playChime(CHIME_FREQ[Math.min(clicks, CHIME_FREQ.length - 1)]);

  const r = yes.getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2, 22);

  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 450);

  clicks++;
  yesSize = Math.min(yesSize + 5, 48);
  yes.style.fontSize = yesSize + 'px';
  /* Build red→blue aura as clicks accumulate */
  const blueGlow = Math.min(clicks * 7, 42);
  const redGlow  = 24 + clicks * 3;
  yes.style.animation = 'none';
  yes.style.boxShadow = `0 0 ${redGlow}px rgba(255,80,120,.9), 0 0 ${blueGlow}px rgba(58,134,255,.8), 0 5px 18px rgba(255,77,109,.45)`;

  updateDots(Math.min(clicks, QUESTIONS.length - 1));

  if(clicks < QUESTIONS.length){
    const q = document.getElementById('question');
    q.style.opacity   = '0';
    q.style.transform = 'translateY(8px)';
    setTimeout(() => {
      typewrite(QUESTIONS[clicks]);
      q.style.opacity   = '1';
      q.style.transform = 'translateY(0)';
    }, 230);
  }

  if(clicks >= QUESTIONS.length - 1){
    done = true;
    setTimeout(() => {
      document.getElementById('question').style.display = 'none';
      dotsEl.style.display = 'none';
      document.querySelector('.btn-row').style.display = 'none';
      document.querySelector('.emoji-top').textContent = '🥰';
      finalDiv.style.display = 'block';

      const cr = card.getBoundingClientRect();
      const cx = cr.left + cr.width  / 2;
      const cy = cr.top  + cr.height / 2;
      burst(cx, cy, 100);
      setTimeout(() => burst(cx, cy, 75),  650);
      setTimeout(() => burst(cx, cy, 60), 1300);
      setTimeout(() => burst(cx, cy, 45), 2000);

      playFanfare();
      no.style.display    = 'none';
      noTip.style.display = 'none';
    }, 900);
  }
});
</script>
</body>
</html>
