<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 One Question</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1a0533 0%,#2d0a4e 30%,#6b0f3a 65%,#ff4d6d 100%);
  background-size:300% 300%;
  animation:bgShift 12s ease infinite;
  overflow:hidden;
  color:#f9fafb;
}

@keyframes bgShift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

/* floating background particles */
.bg-particle{
  position:fixed;
  pointer-events:none;
  animation:floatUp linear infinite;
  opacity:0;
}

@keyframes floatUp{
  0%  {transform:translateY(105vh) rotate(0deg);  opacity:0}
  10% {opacity:.55}
  90% {opacity:.45}
  100%{transform:translateY(-15vh) rotate(360deg);opacity:0}
}

/* card */
.card{
  position:relative;
  background:rgba(20,5,40,.70);
  border:1px solid rgba(255,100,160,.30);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:48px 36px 40px;
  border-radius:28px;
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,180,210,.15);
  max-width:480px;
  width:92%;
  transition:transform .4s ease;
  z-index:10;
}

.card::before{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:28px;
  background:linear-gradient(135deg,rgba(255,100,160,.35),transparent 60%,rgba(180,80,255,.25));
  pointer-events:none;
}

.emoji-top{
  font-size:2.6rem;
  margin-bottom:12px;
  display:block;
  animation:pulse 2s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.12)}
}

h1{
  font-family:'Dancing Script',cursive;
  font-weight:600;
  margin-bottom:32px;
  font-size:2rem;
  line-height:1.3;
  min-height:2.6rem;
  transition:opacity .25s;
}

/* button row */
.btn-row{
  display:flex;
  justify-content:center;
  gap:18px;
}

button{
  font-family:'Poppins',sans-serif;
  font-size:16px;
  padding:14px 32px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s, font-size .25s;
  font-weight:500;
  letter-spacing:.03em;
}

/* YES */
#yes{
  background:linear-gradient(135deg,#ff4d6d,#ff85a1);
  color:white;
  box-shadow:0 0 22px rgba(255,80,120,.75);
}

#yes:hover{
  transform:scale(1.08);
  box-shadow:0 0 32px rgba(255,80,120,1);
}

#yes:active{transform:scale(.97)}

/* NO */
#no{
  background:rgba(10,5,20,.8);
  color:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.12);
  position:fixed;
}

#no:active{transform:scale(.95)}

/* no-tooltip that pops near the NO button */
#no-tip{
  position:fixed;
  background:rgba(20,5,40,.9);
  border:1px solid rgba(255,100,160,.4);
  border-radius:12px;
  padding:6px 14px;
  font-size:.78rem;
  color:#ff85a1;
  pointer-events:none;
  opacity:0;
  transition:opacity .2s;
  white-space:nowrap;
  z-index:999;
}

#no-tip.show{opacity:1}

/* final screen */
#final{
  display:none;
  margin-top:4px;
}

.final-emoji{
  font-size:3rem;
  display:block;
  margin-bottom:12px;
}

.final-title{
  font-family:'Dancing Script',cursive;
  font-size:1.8rem;
  color:#ffb3c6;
  margin-bottom:14px;
}

.final-body{
  font-size:.95rem;
  color:rgba(255,255,255,.85);
  line-height:1.75;
  margin-bottom:18px;
}

.final-badge{
  display:inline-block;
  background:linear-gradient(135deg,#ff4d6d,#c77dff);
  color:white;
  font-size:.75rem;
  letter-spacing:.06em;
  padding:5px 16px;
  border-radius:999px;
  font-weight:600;
}

/* heart burst */
.heart{
  position:fixed;
  pointer-events:none;
  animation:burst ease-out forwards;
  font-size:1.4rem;
  z-index:999;
}

@keyframes burst{
  0%  {opacity:1;transform:translate(0,0) scale(.5) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(var(--dr))}
}

/* sparkle */
.sparkle{
  position:fixed;
  width:6px;height:6px;
  border-radius:50%;
  pointer-events:none;
  animation:sparkleAnim ease-out forwards;
}

@keyframes sparkleAnim{
  0%  {opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
}
</style>
</head>

<body>

<!-- background particles injected by JS -->

<div id="no-tip"></div>

<div class="card">
  <span class="emoji-top">💖</span>
  <h1 id="question">Are you stuck with me now?</h1>

  <div class="btn-row">
    <button id="yes">Yes 💕</button>
    <button id="no">No</button>
  </div>

  <div id="final">
    <span class="final-emoji">🥰</span>
    <p class="final-title">Officially stuck together!</p>
    <p class="final-body">
      No refunds.<br>
      No returns.<br>
      Just you and me, forever. 💗
    </p>
    <span class="final-badge">✨ Certified Ride-or-Die ✨</span>
  </div>
</div>

<script>
/* ── background floating particles ─────────────────────── */
const EMOJIS = ["❤️","💕","💖","💗","✨","🌸","💫","🦋","💝"];
for(let i=0;i<35;i++){
  const el=document.createElement("div");
  el.className="bg-particle";
  el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  el.style.cssText=`
    left:${Math.random()*100}vw;
    font-size:${Math.random()*18+8}px;
    animation-duration:${Math.random()*9+7}s;
    animation-delay:${Math.random()*10}s;
  `;
  document.body.appendChild(el);
}

/* ── DOM refs ───────────────────────────────────────────── */
const yes      = document.getElementById("yes");
const no       = document.getElementById("no");
const question = document.getElementById("question");
const finalDiv = document.getElementById("final");
const noTip    = document.getElementById("no-tip");

/* ── state ──────────────────────────────────────────────── */
let yesSize = 16;
let clicks  = 0;
let done    = false;

const questions = [
  "Are you stuck with me now?",
  "Are you REALLY sure? 🥺",
  "Think very carefully... 🤔",
  "Still yes? Like, for real?",
  "Okay last chance to back out…",
  "Alright then… 🫶"
];

const noTips = [
  "Nope, wrong button!",
  "That one's broken 😇",
  "Nice try~",
  "The cursor slipped, right?",
  "That's not an option 💅",
  "Haha, no. ✨"
];
let tipIndex = 0;

/* ── place NO button beside card on load ────────────────── */
function placeNo(){
  const card = document.querySelector(".card");
  const rect = card.getBoundingClientRect();
  no.style.left = rect.right + 18 + "px";
  no.style.top  = (rect.bottom - 58) + "px";
}
window.addEventListener("load", placeNo);
window.addEventListener("resize", () => { if(no.style.display !== "none") placeNo(); });

/* ── NO button runs away on hover / touch ───────────────── */
function moveNo(){
  const pad = 24;
  const w = no.offsetWidth;
  const h = no.offsetHeight;
  const x = Math.random()*(window.innerWidth  - w - pad*2) + pad;
  const y = Math.random()*(window.innerHeight - h - pad*2) + pad;
  no.style.left = x + "px";
  no.style.top  = y + "px";

  /* show tooltip near new position */
  const tip = noTips[tipIndex % noTips.length];
  tipIndex++;
  noTip.textContent = tip;
  noTip.style.left  = Math.min(x, window.innerWidth - 180) + "px";
  noTip.style.top   = Math.max(y - 38, 8) + "px";
  noTip.classList.add("show");
  clearTimeout(noTip._t);
  noTip._t = setTimeout(()=>noTip.classList.remove("show"), 1200);
}

no.addEventListener("mouseenter", moveNo);
no.addEventListener("touchend", e=>{ e.preventDefault(); moveNo(); }, {passive:false});

/* ── heart + sparkle burst ──────────────────────────────── */
function burst(cx, cy, count=40){
  const HEARTS=["❤️","💕","💖","💗","💝","🩷","✨","🌸"];
  for(let i=0;i<count;i++){
    const el=document.createElement("div");
    el.className="heart";
    el.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*260+80;
    el.style.cssText=`
      left:${cx}px; top:${cy}px;
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      --dr:${Math.random()*360-180}deg;
      animation-duration:${Math.random()*.8+1}s;
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1900);
  }
  /* sparkles */
  const COLORS=["#ff85a1","#ffb3c6","#c77dff","#fffde7","#fff"];
  for(let i=0;i<60;i++){
    const sp=document.createElement("div");
    sp.className="sparkle";
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*200+40;
    sp.style.cssText=`
      left:${cx}px; top:${cy}px;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      --sx:${Math.cos(angle)*dist}px;
      --sy:${Math.sin(angle)*dist}px;
      animation-duration:${Math.random()*.5+.6}s;
    `;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(), 1200);
  }
}

/* ── YES click logic ────────────────────────────────────── */
yes.addEventListener("click", e=>{
  if(done) return;
  clicks++;
  yesSize = Math.min(yesSize + 6, 48);
  yes.style.fontSize = yesSize + "px";

  /* mini burst from button */
  const r = yes.getBoundingClientRect();
  burst(r.left + r.width/2, r.top + r.height/2, 18);

  if(clicks < questions.length){
    question.style.opacity = "0";
    setTimeout(()=>{
      question.textContent = questions[clicks];
      question.style.opacity = "1";
    }, 220);
  }

  if(clicks >= questions.length - 1){
    done = true;
    const delay = clicks < questions.length ? 900 : 0;
    setTimeout(()=>{
      /* hide question & buttons */
      question.style.display = "none";
      document.querySelector(".btn-row").style.display = "none";
      document.querySelector(".emoji-top").textContent = "🥰";
      finalDiv.style.display = "block";

      /* big burst from card center */
      const card = document.querySelector(".card");
      const cr = card.getBoundingClientRect();
      burst(cr.left+cr.width/2, cr.top+cr.height/2, 80);
      setTimeout(()=>burst(cr.left+cr.width/2, cr.top+cr.height/2, 60), 600);
      setTimeout(()=>burst(cr.left+cr.width/2, cr.top+cr.height/2, 50), 1200);

      /* hide runaway NO */
      no.style.display = "none";
      noTip.style.display = "none";
    }, delay);
  }
});
</script>

</body>
</html>
