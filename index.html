<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One Question</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top left,#0f172a,#0b1d51,#ff4d6d);
overflow:hidden;
color:#f9fafb;
}

/* floating background hearts */
.bg-heart{
position:fixed;
font-size:20px;
color:#ff6b9e;
opacity:.4;
animation:float 10s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(110vh)}
100%{transform:translateY(-20vh)}
}

/* card */
.card{
background:rgba(15,23,42,.65);
border:1px solid rgba(148,163,184,.35);
backdrop-filter:blur(16px);
padding:40px 30px;
border-radius:22px;
text-align:center;
box-shadow:0 18px 50px rgba(0,0,0,.6);
max-width:450px;
width:90%;
}

h1{
font-weight:500;
margin-bottom:28px;
font-size:1.7rem;
}

/* button row */
.btn-row{
display:flex;
justify-content:center;
gap:16px;
}

button{
font-family:'Poppins',sans-serif;
font-size:18px;
padding:14px 26px;
border:none;
border-radius:999px;
cursor:pointer;
transition:.18s;
}

/* YES */
#yes{
background:#ff4d6d;
color:white;
box-shadow:0 0 18px rgba(255,80,120,.8);
}

#yes:hover{
transform:scale(1.07);
}

/* NO */
#no{
background:#020617;
color:white;
}

/* final text */
#final{
display:none;
font-size:20px;
margin-top:18px;
line-height:1.4;
}

/* heart explosion */
.heart{
position:fixed;
font-size:24px;
color:#ff5c8a;
animation:explode 3s ease-out forwards;
pointer-events:none;
}

@keyframes explode{
0%{transform:scale(.6);opacity:1}
100%{transform:translateY(-700px) scale(1.5);opacity:0}
}
</style>
</head>

<body>

<script>
// background hearts
for(let i=0;i<30;i++){
let h=document.createElement("div")
h.className="bg-heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
h.style.fontSize=(Math.random()*16+10)+"px"
h.style.animationDuration=(Math.random()*7+6)+"s"
document.body.appendChild(h)
}
</script>

<div class="card">

<h1 id="question">Are you stuck with me now?</h1>

<div class="btn-row">
<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<div id="final">
<p>Too late. You are now permanently stuck with me.</p>
<p><small>No uninstall available.</small></p>
</div>

</div>

<script>

const yes = document.getElementById("yes");
const no = document.getElementById("no");
const question = document.getElementById("question");
const final = document.getElementById("final");

let yesSize = 18;
let clicks = 0;

const questions = [
"Are you stuck with me now?",
"Are you REALLY sure?",
"Think carefully...",
"Still yes?",
"Alright then..."
];

/* move NO beside the card on load */
window.addEventListener("load", () => {

  const card = document.querySelector(".card");
  const rect = card.getBoundingClientRect();

  no.style.position = "fixed";
  no.style.left = rect.right + 20 + "px";
  no.style.top = rect.bottom - 60 + "px";

});

/* NO runs away but stays on screen */
function moveNo(){

  const padding = 20;
  const rect = no.getBoundingClientRect();

  const maxX = window.innerWidth - rect.width - padding;
  const maxY = window.innerHeight - rect.height - padding;

  const x = Math.random() * (maxX - padding) + padding;
  const y = Math.random() * (maxY - padding) + padding;

  no.style.left = x + "px";
  no.style.top = y + "px";
}

no.addEventListener("mouseenter", moveNo);

/* YES click logic */
yes.onclick = () => {

  yesSize += 8;
  yes.style.fontSize = yesSize + "px";

  clicks++;

  if(clicks < questions.length){
    question.textContent = questions[clicks];
  }

  if(clicks >= 5){

    question.style.display = "none";
    yes.style.display = "none";
    no.style.display = "none";
    final.style.display = "block";

    for(let i=0;i<120;i++){

      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤";

      heart.style.left = Math.random()*100+"vw";
      heart.style.top = Math.random()*100+"vh";

      document.body.appendChild(heart);

      setTimeout(()=>heart.remove(),3500);

    }

  }

};
</script>

</body>
</html>
