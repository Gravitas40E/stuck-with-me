<html>
<head>
    <title>Stuck with Me</title>
    <style>
        /* Add your styles here */
    </style>
</head>
<body>
    <div id="app">
        <button id="no">No</button>
    </div>
    <script>
        function placeNo() {
            const button = document.getElementById('no');
            const viewportHeight = window.innerHeight;
            const viewportWidth = window.innerWidth;

            // Calculate the position to keep the button inside the viewport
            const top = Math.min(viewportHeight - button.offsetHeight, 100); // Clamped position
            const left = Math.min(viewportWidth - button.offsetWidth, 100); // Clamped position

            button.style.position = 'absolute';
            button.style.top = top + 'px';
            button.style.left = left + 'px';
        }

        // Call placeNo on load and resize events
        window.onload = placeNo;
        window.onresize = placeNo;
    </script>
</body>
</html>
